name: Quality and security evidence

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out immutable source
        uses: actions/checkout@v7
      - name: Use supported Node runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install from lockfile
        run: npm ci
      - name: Static checks
        run: npm run lint && npm run typecheck
      - name: Deterministic tests and production build
        run: npm test
      - name: Block high or critical production dependency findings
        run: npm audit --omit=dev --audit-level=high

  codeql:
    name: CodeQL JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
